<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threat Loop Experience</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-family:Arial;
}

#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,255,255,0);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="ui">
  W = Move<br>
  F = Armour<br>
  Armour Uses: <span id="count">0</span><br>
  Cooldown: <span id="cooldown">Ready</span>
</div>

<div id="overlay"></div>

<div id="endScreen" style="
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-family:Arial;
  background:rgba(0,0,0,0.7);
">

  <h1>You have become part of the system</h1>

  <button onclick="location.reload()" style="
    padding:12px 24px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
  ">
    Restart
  </button>

</div>
  
  

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// SCENE
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 60);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.PointLight(0xffffff,1);
light.position.set(0,5,5);
scene.add(light);

// PLAYER
let player = new THREE.Object3D();
player.position.set(0,1.5,0);
scene.add(player);

camera.position.set(0,1.5,2);
player.add(camera);

// ARMOUR VISUAL
let armourGroup = new THREE.Group();
for(let i=0;i<6;i++){
  let cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.5,0.5),
    new THREE.MeshStandardMaterial({color:0x00ffff})
  );

  let angle = (i/6)*Math.PI*2;
  cube.position.set(Math.cos(angle)*1.5,0,Math.sin(angle)*1.5 - 1.5);
  armourGroup.add(cube);
}
armourGroup.visible = false;
player.add(armourGroup);

// INPUT
let keys = {};
window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="f"){
    activateArmour();
  }
});

window.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// TUNNEL
function createSegment(z,type){
  let color = type==="water"?0x0a1a3a:0x0a2a0a;
  let mat = new THREE.MeshStandardMaterial({color});

  let floor = new THREE.Mesh(new THREE.PlaneGeometry(20,10),mat);
  floor.rotation.x = -Math.PI/2;
  floor.position.set(0,0,z);

  let wallL = new THREE.Mesh(new THREE.PlaneGeometry(10,10),mat);
  wallL.position.set(-10,5,z);
  wallL.rotation.y = Math.PI/2;

  let wallR = wallL.clone();
  wallR.position.set(10,5,z);
  wallR.rotation.y = -Math.PI/2;

  let ceiling = floor.clone();
  ceiling.position.set(0,10,z);
  ceiling.rotation.x = Math.PI/2;

  scene.add(floor,wallL,wallR,ceiling);
}

for(let i=0;i<40;i++){
  createSegment(-i*10, i%2===0?"water":"forest");
}

// THREATS
let threats = [];

function createThreat(z,type){
  let t = new THREE.Mesh(
    new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({
      color: type==="AT"?0xff4444:0xffff88,
      emissive: type==="AT"?0x440000:0x444400
    })
  );

  t.position.set(0,1.5,z);
  t.userData = {type, triggered:false};
  scene.add(t);
  threats.push(t);
}

for(let i=1;i<30;i++){
  createThreat(-i*20, Math.random()>0.5?"AT":"PT");
}

// GAME STATE
let speed = 0.2;

let armourUses = 0;
let MAX_ARMOUR = 3;

let armourActive = false;
let armourStart = 0;
let ARMOUR_DURATION = 5000;

let cooldown = false;
let cooldownStart = 0;
let COOLDOWN_TIME = 3000;

let systemLocked = false;

let overlay = document.getElementById("overlay");
let endScreen = document.getElementById("endScreen");

// ARMOUR FUNCTION
function activateArmour(){
  if(armourUses >= MAX_ARMOUR || cooldown || armourActive || systemLocked) return;

  armourActive = true;
  armourStart = Date.now();

  armourUses++;
  document.getElementById("count").innerText = armourUses;
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
let moveSpeed = systemLocked ? speed * 0.5 : speed;

if((keys["w"] || systemLocked) && endScreen.style.display !== "flex"){

  threats.forEach(t=>{
    t.position.z += moveSpeed;

    // LOOP RESET
    if(t.position.z > 10){
      t.position.z -= 600;
      t.userData.triggered = false;
      t.position.x = 0; // reset dodge drift
    }
  });

}

// ARMOUR STATE
if(armourActive){
  armourGroup.visible = true;

  // pulse animation
  armourGroup.rotation.y += 0.05;

  overlay.style.background = "rgba(0,255,255,0.08)";

  if(Date.now() - armourStart > ARMOUR_DURATION){
    armourActive = false;
    cooldown = true;
    cooldownStart = Date.now();
  }

} else {
  armourGroup.visible = false;
  overlay.style.background = "rgba(0,0,0,0)";
}

// COOLDOWN
if(cooldown){
  let remaining = Math.ceil((COOLDOWN_TIME - (Date.now()-cooldownStart))/1000);
  document.getElementById("cooldown").innerText = remaining + "s";

  if(Date.now() - cooldownStart > COOLDOWN_TIME){
    cooldown = false;
    document.getElementById("cooldown").innerText = "Ready";
  }
}

// THREATS
threats.forEach(t=>{
  t.position.y = 1.5 + Math.sin(Date.now()*0.002 + t.position.z)*0.3;

  if(t.position.z > 10){
  t.position.z = -600; // send back far
  t.userData.triggered = false;
}

  let dist = Math.abs(t.position.z);

  if(dist < 3 && !t.userData.triggered){

    if(t.userData.type==="AT"){
      if(!armourActive){
        alert("You were hit. Loop restarts.");
        location.reload();
      }
    }

    if(t.userData.type==="PT"){
      // dodge illusion
      t.position.x += (Math.random()-0.5)*6;
    }

    t.userData.triggered = true;
  }
});

// SYSTEM LOCK
if(armourUses >= MAX_ARMOUR && !systemLocked){
  systemLocked = true;

  // move camera to 3rd person
  camera.position.set(0,3,6);
  camera.lookAt(player.position);

  // show message
  endScreen.style.display = "flex";
}

// RENDER
renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
