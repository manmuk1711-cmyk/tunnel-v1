<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threat Loop Experience</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

#ui{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  z-index:20;
  line-height:1.5;
}

#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,255,255,0);
  pointer-events:none;
  z-index:5;
  transition:background 0.3s;
}

#endScreen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.75);
  color:white;
  z-index:10;
  text-align:center;
}

#endScreen h1{
  font-size:42px;
  margin-bottom:20px;
}

#endScreen button{
  padding:12px 24px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
  W = Move<br>
  F = Armour<br>
  Armour Uses: <span id="count">0</span><br>
  Cooldown: <span id="cooldown">Ready</span>
</div>

<div id="overlay"></div>

<div id="endScreen">
  <h1>You have become part of the system</h1>
  <button onclick="location.reload()">Restart</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,10,60);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
const light = new THREE.PointLight(0xffffff,1.5);
light.position.set(0,6,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.3);
scene.add(ambient);

// PLAYER
const player = new THREE.Object3D();
player.position.set(0,1.5,0);
scene.add(player);

camera.position.set(0,1.5,2);
player.add(camera);

// UI ELEMENTS
const overlay = document.getElementById("overlay");
const endScreen = document.getElementById("endScreen");
const countUI = document.getElementById("count");
const cooldownUI = document.getElementById("cooldown");

// ARMOUR
const armourGroup = new THREE.Group();

for(let i=0;i<6;i++){
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.5,0.5),
    new THREE.MeshStandardMaterial({
      color:0x00ffff,
      emissive:0x003333
    })
  );

  const angle = (i/6)*Math.PI*2;
  cube.position.set(
    Math.cos(angle)*1.5,
    0,
    Math.sin(angle)*1.5 - 1.5
  );

  armourGroup.add(cube);
}

armourGroup.visible = false;
player.add(armourGroup);

// INPUT
const keys = {};

window.addEventListener("keydown",(e)=>{
  const key = e.key.toLowerCase();
  keys[key] = true;

  if(key==="f"){
    activateArmour();
  }
});

window.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()] = false;
});

// TUNNEL
function createSegment(z,type){
  const color = type==="water" ? 0x0a1a3a : 0x0a2a0a;
  const mat = new THREE.MeshStandardMaterial({color});

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,10),
    mat
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.set(0,0,z);

  const wallL = new THREE.Mesh(
    new THREE.PlaneGeometry(10,10),
    mat
  );
  wallL.position.set(-10,5,z);
  wallL.rotation.y = Math.PI/2;

  const wallR = wallL.clone();
  wallR.position.set(10,5,z);
  wallR.rotation.y = -Math.PI/2;

  const ceiling = floor.clone();
  ceiling.position.set(0,10,z);
  ceiling.rotation.x = Math.PI/2;

  scene.add(floor,wallL,wallR,ceiling);
}

for(let i=0;i<40;i++){
  createSegment(-i*10, i%2===0 ? "water" : "forest");
}

// THREATS
const threats = [];

function createThreat(z,type){
  const threat = new THREE.Mesh(
    new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({
      color: type==="AT" ? 0xff4444 : 0xffff66,
      emissive: type==="AT" ? 0x440000 : 0x444400
    })
  );

  threat.position.set(0,1.5,z);
  threat.userData = {
    type:type,
    triggered:false
  };

  scene.add(threat);
  threats.push(threat);
}

for(let i=1;i<30;i++){
  createThreat(
    -i*20,
    Math.random()>0.5 ? "AT" : "PT"
  );
}

// GAME STATE
const speed = 0.2;
const MAX_ARMOUR = 3;
const ARMOUR_DURATION = 5000;
const COOLDOWN_TIME = 3000;

let armourUses = 0;
let armourActive = false;
let armourStart = 0;

let cooldown = false;
let cooldownStart = 0;

let systemLocked = false;

// ARMOUR FUNCTION
function activateArmour(){
  if(
    armourUses >= MAX_ARMOUR ||
    armourActive ||
    cooldown ||
    systemLocked
  ) return;

  armourActive = true;
  armourStart = Date.now();

  armourUses++;
  countUI.innerText = armourUses;
}

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  const moveSpeed = systemLocked ? speed*0.5 : speed;

  // MOVE WORLD
  if(keys["w"] || systemLocked){

    threats.forEach(t=>{
      t.position.z += moveSpeed;

      if(t.position.z > 10){
        t.position.z -= 600;
        t.position.x = 0;
        t.userData.triggered = false;
      }
    });
  }

  // ARMOUR ACTIVE
  if(armourActive){
    armourGroup.visible = true;
    armourGroup.rotation.y += 0.05;
    overlay.style.background = "rgba(0,255,255,0.08)";

    if(Date.now() - armourStart > ARMOUR_DURATION){
      armourActive = false;
      cooldown = true;
      cooldownStart = Date.now();
    }

  }else{
    armourGroup.visible = false;
    overlay.style.background = "rgba(0,0,0,0)";
  }

  // COOLDOWN
  if(cooldown){
    const remaining = Math.ceil(
      (COOLDOWN_TIME - (Date.now()-cooldownStart))/1000
    );

    cooldownUI.innerText = remaining + "s";

    if(Date.now() - cooldownStart > COOLDOWN_TIME){
      cooldown = false;
      cooldownUI.innerText = "Ready";
    }
  }

  // THREATS BEHAVIOUR
  threats.forEach(t=>{

    t.position.y =
      1.5 + Math.sin(Date.now()*0.002 + t.position.z)*0.3;

    const dist = Math.abs(t.position.z);

    if(dist < 3 && !t.userData.triggered){

      if(t.userData.type==="AT"){
        if(!armourActive){
          alert("You were hit. Loop restarts.");
          location.reload();
        }
      }

      if(t.userData.type==="PT"){
        t.position.x += (Math.random()-0.5)*6;
      }

      t.userData.triggered = true;
    }
  });

  // ENDING
  if(armourUses >= MAX_ARMOUR && !systemLocked){
    systemLocked = true;

    player.remove(camera);
    scene.add(camera);

    camera.position.set(0,4,8);
    camera.lookAt(player.position);

    endScreen.style.display = "flex";
  }

  renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
