<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threat Loop Experience</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-family:Arial;
}

#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,255,255,0);
  pointer-events:none;
  z-index: 5;
}
</style>
</head>

<body>

<div id="ui">
  W = Move<br>
  F = Armour<br>
  Armour Uses: <span id="count">0</span><br>
  Cooldown: <span id="cooldown">Ready</span>
</div>

<div id="overlay"></div>

<div id="endScreen" style="
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-family:Arial;
  background:rgba(0,0,0,0.7);
  z-index: 10;
">

  <h1>You have become part of the system</h1>

  <button onclick="location.reload()" style="
    padding:12px 24px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
  ">
    Restart
  </button>

</div>
  
  

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>

// SCENE
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 20, 200);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.PointLight(0xffffff,1);
light.position.set(0,5,5);
scene.add(light);

//TESTT CUBE
let testCube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({color:0x00ff00})
);
testCube.position.set(0,1.5,-5);
scene.add(testCube);

// PLAYER
let player = new THREE.Object3D();
player.position.set(0,1.5,0);
scene.add(player);

camera.position.set(0,1.5,2);
player.add(camera);

// ARMOUR VISUAL
let armourGroup = new THREE.Group();
for(let i=0;i<6;i++){
  let cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.5,0.5),
    new THREE.MeshStandardMaterial({color:0x00ffff})
  );

  let angle = (i/6)*Math.PI*2;
  cube.position.set(Math.cos(angle)*1.5,0,Math.sin(angle)*1.5 - 1.5);
  armourGroup.add(cube);
}
armourGroup.visible = false;
player.add(armourGroup);

// INPUT
let keys = {};
window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="f"){
    activateArmour();
  }
});

window.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// TUNNEL
let tunnels = [];

// THREATS
let threats = [];


function createThreat(z,type){
  let t = new THREE.Mesh(
    new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({
      color: type==="AT"?0xff4444:0xffff88,
      emissive: type==="AT"?0x440000:0x444400
    })
  );

  t.position.set(0,1.5,z);
  t.userData = {type, triggered:false};
  scene.add(t);
  threats.push(t);
}

for(let i=1;i<30;i++){
  createThreat(-i*20, Math.random()>0.5?"AT":"PT");
}

//gltb loader
  
let loader = new THREE.GLTFLoader();

loader.load("Tunnel5_GS.glb"),

  function(gltf){
    console.log("GLB loaded successfully");

    let model = gltf.scene;

    for(let i=0;i<10;i++){
      let segment = model.clone();

      segment.scale.set(2,2,2);
      segment.position.y = -1;
      segment.rotation.y = Math.PI;
      segment.position.z = -i * 20;

      scene.add(segment);
      tunnels.push(segment);
    }
  },

  undefined,

  function(error){
    console.error("GLB FAILED:", error);

    // fallback tunnel (so screen is NOT black)
    for(let i=0;i<10;i++){
      let geo = new THREE.CylinderGeometry(5,5,20,16,1,true);
      let mat = new THREE.MeshBasicMaterial({wireframe:true});
      let tunnel = new THREE.Mesh(geo, mat);

      tunnel.rotation.z = Math.PI/2;
      tunnel.position.z = -i * 20;

      scene.add(tunnel);
      tunnels.push(tunnel);
    }
  }
);

// GAME STATE
let speed = 0.2;

let armourUses = 0;
let MAX_ARMOUR = 3;

let armourActive = false;
let armourStart = 0;
let ARMOUR_DURATION = 5000;

let cooldown = false;
let cooldownStart = 0;
let COOLDOWN_TIME = 3000;

let systemLocked = false;

let overlay = document.getElementById("overlay");
let endScreen = document.getElementById("endScreen");

// ARMOUR FUNCTION
function activateArmour(){
  if(armourUses >= MAX_ARMOUR || cooldown || armourActive || systemLocked) return;

  armourActive = true;
  armourStart = Date.now();

  armourUses++;
  document.getElementById("count").innerText = armourUses;
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
let moveSpeed = systemLocked ? speed * 0.5 : speed;

if((keys["w"] || systemLocked) && endScreen.style.display !== "flex"){

  // ✅ MOVE THREATS
threats.forEach(threat=>{
  threat.position.z += moveSpeed;

  if(threat.position.z > 10){
    threat.position.z -= 600;
    threat.userData.triggered = false;
    threat.position.x = 0;
  }
});

// ✅ MOVE TUNNEL (SEPARATE)
tunnels.forEach(tunnel=>{
  tunnel.position.z += moveSpeed;

  if(tunnel.position.z > 30){
    tunnel.position.z -= 300;
  }
});

}

// ARMOUR STATE
if(armourActive){
  armourGroup.visible = true;

  // pulse animation
  armourGroup.rotation.y += 0.05;

  overlay.style.background = "rgba(0,255,255,0.08)";

  if(Date.now() - armourStart > ARMOUR_DURATION){
    armourActive = false;
    cooldown = true;
    cooldownStart = Date.now();
  }

} else {
  armourGroup.visible = false;
  overlay.style.background = "rgba(0,0,0,0)";
}

// COOLDOWN
if(cooldown){
  let remaining = Math.ceil((COOLDOWN_TIME - (Date.now()-cooldownStart))/1000);
  document.getElementById("cooldown").innerText = remaining + "s";

  if(Date.now() - cooldownStart > COOLDOWN_TIME){
    cooldown = false;
    document.getElementById("cooldown").innerText = "Ready";
  }
}

// THREATS
threats.forEach(t=>{
  t.position.y = 1.5 + Math.sin(Date.now()*0.002 + t.position.z)*0.3;

  //if(t.position.z > 10){
  //t.position.z = -600; // send back far
 // t.userData.triggered = false;
//}

  let dist = Math.abs(t.position.z);

  if(dist < 3 && !t.userData.triggered){

    if(t.userData.type==="AT"){
      if(!armourActive){
        alert("You were hit. Loop restarts.");
        location.reload();
      }
    }

    if(t.userData.type==="PT"){
      // dodge illusion
      t.position.x += (Math.random()-0.5)*6;
    }

    t.userData.triggered = true;
  }
});

// SYSTEM LOCK
if(armourUses >= MAX_ARMOUR && !systemLocked){
  systemLocked = true;

  // move camera to 3rd person
  camera.position.set(0,3,6);
  camera.lookAt(player.position);

  // show message
  endScreen.style.display = "flex";
}

// RENDER
renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
